        This article has 1 citations.\\n\\n------------\\n\\nthat gives subgraph importance
        for small molecule activity prediction. On the\\n\\nother hand, similarity maps
        compare model predictions for two or more molecules based on\\n\\ntheir chemical
        fingerprints.83 Similarity maps provide atomic weights or predicted probabil-\\n\\n\\n
        \                                      9ity difference between the molecules
        by removing one atom at a time. These weights can\\n\\nthen be used to color
        the molecular graph and give a visual presentation. ChemInformatics\\n\\nModel
        Explorer (CIME) is an interactive web based toolkit which allows visualization
        and\\n\\ncomparison of different explanation methods for molecular property
        prediction models.84\\n\\n\\nSurrogate models\\n\\n\\nOne approach to explain
        black box predictions is to fit a self-explaining or interpretable\\n\\nmodel
        to the black box model, in the vicinity of one or a few specific examples. These
        are\\n\\nknown as surrogate models. Generally, one model per explanation is
        trained. However, if we\\n\\ncould find one surrogate model that explained the
        whole DL model, then we would simply\\n\\nhave a globally accurate interpretable
        model. This means that the black-box model is no\\n\\nlonger needed.79 In the
        work by White 79, a weighted least squares linear model is used as\\n\\nthe
        surrogate model. This model provides natural language based descriptor explanations
        by\\n\\nreplacing input features with chemically interpretable descriptors.
        This approach is similar\\n\\nto the concept-based explanations approach used
        by McGrath et al. 85, where human under-\\n\\nstandable concepts were used in
        place of input features in acquisition of chess knowledge in\\n\\nAlphaZero.
        Any of the self-explaining models detailed in the Self-explaining models section\\n\\ncan
        be used as a surrogate model.\\n\\n   The most commonly used surrogate model
        based method is Locally Interpretable Model\\n\\nExplanations (LIME).35 LIME
        creates perturbations around the example of interest and fits\\n\\nan interpretable
        model to these local perturbations. Ribeiro et al. 35 mathematically define\\n\\nan
        explanation \u03BE for an example \u20D7x using Equation 4.\\n\\n\\n\\n                                   \u03BE(\u20D7x)
        = arg min L(f, g, \u03C0x) + \u2126(g)                           (4)\\n                                      g\u2208G\\n\\n
        \  Here f is the black box model and g \u2208G is the interpretable explanation
        model. G is\\n\\na class of potential interpretable models (e.g.:  linear models).
        \u03C0x is a similarity measure\\n\\n\\n\\n                                       10between
        original input \u20D7x and it\u2019s perturbed input \u20D7x\u2032. In context
        of molecular data, this can\\n\\nbe a chemical similarity metric like Tanimoto86
        similarity between fingerprints. The goal for\\n\\nLIME is to minimize the loss,
        L, such that f is closely approximated by g. \u2126is a parameter\\n\\nthat
        controls the complexity (sparsity) of g. Ribeiro et al. 35 termed the agreement
        (how low\\n\\nthe loss is) between f and g as the \u201Cfidelity\u201D.\\n\\n
        \  GraphLIME87 and LIMEtree88 are modifications to LIME as applicable to graph
        neural\\n\\nnetworks and regression trees, respectively. LIME has been used
        in chemistry previously,\\n\\nsuch as Whitmore et al. 89 who used LIME to explain
        octane number predictions of molecules\\n\\nfrom a random forest classifier.
        Mehdi and Tiwary 90 used LIME to explain thermodynamic\\n\\ncontributions of
        features. Gandhi and White 10 use an approach similar to GraphLIME,\\n\\nbut
        use chemistry specific fragmentation and descriptors to explain molecular property
        pre-\\n\\ndiction. Some examples are highlighted in the Applications section.
        \ In recent work by\\n\\nMehdi and Tiwary 90, a thermodynamic-based surrogate
        model approach was used to inter-\\n\\npret black-box models. The authors define
        an \u201Cinterpretation free energy\u201D which can be\\n\\nachieved by minimizing
        the surrogate model\u2019s uncertainty and maximizing simplicity.\\n\\n\\nCounterfactual
        explanations\\n\\n\\nCounterfactual explanations can be found in many fields
        such as statistics, mathematics and\\n\\nphilosophy.91\u201394 According to
        Woodward and Hitchcock 92, a counterfactual is an example\\n\\nwith minimum
        deviation from the initial instance but with a contrasting outcome. They\\n\\ncan
        be used to answer the question, \u201Cwhich smallest change could alter the
        outcome of an\\n\\ninstance of interest?\u201D While the difference between
        the two instances is based on the exis-\\n\\ntence of similar worlds in philosophy,95
        a distance metric based on molecular similarity is\\n\\nemployed in XAI for
        chemistry. For example, in the work by Wellawatte et al. 9 distance\\n\\nbetween
        two molecules is defined as the Tanimoto distance96 between ECFP4 fingerprints.97\\n\\nAdditionally,
        Mohapatra et al. 98 introduced a chemistry-informed graph representation for\\n\\ncomputing
        macromolecular similarity. Contrastive explanations are peripheral to counterfac-\\n\\n\\n
        \                                      11tual explanations. Unlike the counterfactual
        approach, contrastive approach employ a dual\\n\\noptimization method, which
        works by generating a similar and a dissimilar (counterfactuals)\\n\\nexample.
