        Republished with permission from authors.31\\n\\n\\n   The molecule 2,4-decadienal,
        which is known to have a \u2018fatty\u2019 scent, is analyzed in Fig-\\n\\nure
        5.142,143 The resulting counterfactual, which has a shorter carbon chain and
