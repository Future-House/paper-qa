        doi:10.1021/acs.jctc.2c01235. This article has 52 citations and is from a domain
        leading peer-reviewed journal.\\n\\n------------\\n\\nut to models informs the
        XAI method.\\n\\n\\nConclusion and outlook\\n\\n\\nWe should seek to explain
        molecular property prediction models because users are more\\n\\nlikely to trust
        explained predictions, and explanations can help assess if the model is learning\\n\\nthe
        correct underlying chemical principles. We also showed that black-box modeling
        first,\\n\\nfollowed by XAI, is a path to structure-property relationships without
