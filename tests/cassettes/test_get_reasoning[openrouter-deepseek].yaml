        Computation, 19:2149-2160, Mar 2023. URL: https://doi.org/10.1021/acs.jctc.2c01235,
        doi:10.1021/acs.jctc.2c01235. This article has 55 citations and is from a domain
        leading peer-reviewed journal.\n\npqac-147ae54f: Explainable Artificial Intelligence
        (XAI) is a framework aimed at making the decision-making processes of machine
        learning models, particularly deep learning (DL) models, interpretable and understandable.
        XAI involves a two-step process: first, developing an accurate but often uninterpretable
        DL model, and then adding explanations to its predictions. These explanations
        provide context and causes for predictions, ideally offering insights into the
        underlying mechanisms. XAI methods can be intrinsic (built into the model) or
        extrinsic (applied post-training). Evaluating XAI involves attributes like actionability,
        completeness, correctness, domain applicability, fidelity, robustness, and succinctness.\nFrom
        Geemi P. Wellawatte, Heta A. Gandhi, Aditi Seshadri, and Andrew D. White. A
        perspective on explanations of molecular prediction models. Journal of Chemical
