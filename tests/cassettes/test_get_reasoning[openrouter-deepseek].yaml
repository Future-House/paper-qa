        \u2212\u02C6f (\u20D7z\u2212i)                            (3)\\n                 M\\n\\n
        \  Here \u20D7z is a fabricated example created from the original \u20D7x and
        a random perturbation \u20D7x\u2032.\\n\\n\u20D7z+i has the feature i from \u20D7x
