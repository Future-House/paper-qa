        of counter-\\n\\n     factual explanations for molecules. Chemical Science 2022,
        13, 3697\u20133705.\\n\\n\\n(10) Gandhi, H. A.; White, A. D. Explaining structure-ac\\n\\n---\\n\\nQuestion:
        What is XAI?\"}],\"model\":\"gpt-4o-2024-11-20\",\"n\":1,\"temperature\":0.0}"
