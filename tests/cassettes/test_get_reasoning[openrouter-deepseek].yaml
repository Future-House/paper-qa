        for\\nMACCS descriptors were created using SMARTSviewer (smartsview.zbh.uni-hamburg.de,\\nCopyright:
        ZBH, Center for Bioinformatics Hamburg) developed by Schomburg et al. 132.\\n\\n\\n\\n\\n\\n
