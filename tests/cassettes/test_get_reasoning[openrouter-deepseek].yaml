        parentheticals:\n- (pqac-d79ef6fa, pqac-0f650d59)\n- (pqac-d79ef6fa)\n## Invalid
        citation examples:\n- (pqac-d79ef6fa and pqac-0f650d59)\n- (pqac-d79ef6fa;pqac-0f650d59)\n-
        (pqac-d79ef6fa-pqac-0f650d59)\n- pqac-d79ef6fa and pqac-0f650d59\n- Example''s
        work (pqac-d79ef6fa)\n- (pages pqac-d79ef6fa)\n\nDo not concatenate citation
