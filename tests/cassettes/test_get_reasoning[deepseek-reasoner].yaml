        \  GraphLIME87 and LIMEtree88 are modifications to LIME as applicable to graph
        neural\\n\\nnetworks and regression trees, respectively. LIME has been used
        in chemistry previously,\\n\\nsuch as Whitmore et al. 89 who used LIME to explain
        octane number predictions of molecules\\n\\nfrom a random forest classifier.
        Mehdi and Tiwary 90 used LIME to explain thermodynamic\\n\\ncontributions of
        features. Gandhi and White 10 use an approach similar to GraphLIME,\\n\\nbut
