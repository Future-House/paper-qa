        The solubility values are mapped to a color gradient, providing a visual representation
        of solubility trends across the chemical space.\\n\\nThis visualization highlights
        how structural modifications to a molecule influence its solubility, with the
        counterfactuals serving as examples of potential changes. It demonstrates the
        use of machine learning and explainable AI (XAI) to explore structure-property
        relationships in chemistry.\",\"nal molecule.  The counterfactual indicates\\nstructural
        changes to ethyl benzoate that would result in the model predicting the molecule\\nto
