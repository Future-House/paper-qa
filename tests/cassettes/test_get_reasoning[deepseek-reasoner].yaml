        \ In recent work by\\n\\nMehdi and Tiwary 90, a thermodynamic-based surrogate
        model approach was used to inter-\\n\\npret black-box models. The authors define
        an \u201Cinterpretation free energy\u201D which can be\\n\\nachieved by minimizing
        the surrogate model\u2019s uncertainty and maximizing simplicity.\\n\\n\\nCounterfactual
        explanations\\n\\n\\nCounterfactual explanations can be found in many fields
        such as statistics, mathematics and\\n\\nphilosophy.91\u201394 According to
        Woodward and Hitchcock 92, a counterfactual is an example\\n\\nwith minimum
        deviation from the initial instance but with a contrasting outcome. They\\n\\ncan
        be used to answer the question, \u201Cwhich smallest change could alter the
        outcome of an\\n\\ninstance of interest?\u201D While the difference between
        the two instances is based on the exis-\\n\\ntence of similar worlds in philosophy,95
        a distance metric based on molecular similarity is\\n\\nemployed in XAI for
        chemistry. For example, in the work by Wellawatte et al. 9 distance\\n\\nbetween
        two molecules is defined as the Tanimoto distance96 between ECFP4 fingerprints.97\\n\\nAdditionally,
        Mohapatra et al. 98 introduced a chemistry-informed graph representation for\\n\\ncomputing
        macromolecular similarity. Contrastive explanations are peripheral to counterfac-\\n\\n\\n
        \                                      11tual explanations. Unlike the counterfactual
        approach, contrastive approach employ a dual\\n\\noptimization method, which
