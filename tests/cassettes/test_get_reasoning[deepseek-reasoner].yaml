        a few failure mode with possible resolutions:\\n- The media was a logo or icon,
        so the text is unrelated. In this case, briefly describe the media as a logo
        or icon, and do not mention other unrelated surrounding text.\\n- The media
        was display type, so the text is probably unrelated. The display type can be
