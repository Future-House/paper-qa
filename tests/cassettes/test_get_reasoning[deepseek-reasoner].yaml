        is an integer 1-10 for the relevance of `summary` to the question. `used_images`
        is a boolean flag indicating if any images present in a multimodal message were
        used, and if no images were present it should be false.\"},{\"role\":\"user\",\"content\":\"Excerpt
        from Wellawatte2023 pages 22-25: Wellawatte et al, XAI Review, 2023\\n\\n------------\\n\\nut
        to models informs the XAI method.\\n\\n\\nConclusion and outlook\\n\\n\\nWe
        should seek to explain molecular property prediction models because users are
        more\\n\\nlikely to trust explained predictions, and explanations can help assess
        if the model is learning\\n\\nthe correct underlying chemical principles. We
        also showed that black-box modeling first,\\n\\nfollowed by XAI, is a path to
        structure-property relationships without needing to trade\\n\\nbetween accuracy
        and interpretability. However, XAI in chemistry has some major open\\n\\nquestions,
        that are also related to the black-box nature of the deep learning. Some are\\n\\n\\n\\n
        \                                      22highlighted below:\\n\\n\\n   \u2022
        Explanation representation: How is an explanation presented \u2013 text, a molecule,
        attri-\\n\\n      butions, a concept, etc?\\n\\n\\n   \u2022 Molecular distance:
        \ in XAI approaches such as counterfactual generation, the \u201Cdis-\\n\\n
        \    tance\u201D between two molecules is minimized. Molecular distance is subjective.
        Possibil-\\n\\n       ities are distance based on molecular properties, synthesis
        routes, and direct structure\\n\\n     comparisons.\\n\\n\\n   \u2022 Regulations:
        As black-box models move from research to industry, healthcare, and\\n\\n     environmental
        settings, we expect XAI to become more important to explain decisions\\n\\n
        \     to chemists or non-experts and possibly be legally required. Explanations
        may need\\n\\n      to be tuned for be for doctors instead of chemists or to
        satisfy a legal requirement.\\n\\n\\n   \u2022 Chemical space: Chemical space
        is the set of molecules that are realizable; \u201Crealiz-\\n\\n     able\u201D
        can be defined from purchasable to synthesizable to satisfied valences. What
        is\\n\\n     most useful? Can an explanation consider nearby impossible molecules?
        How can we\\n\\n     generate local chemical spaces centered around a specific
        molecule for finding counter-\\n\\n      factuals or other instance explanations?
        \ Similarly, can \u201Cactivity cliffs\u201D be connected\\n\\n      to explanations
        and the local chemical space.149\\n\\n\\n   \u2022 Evaluating XAI : there is
        a lack of a systematic framework (quantitative or qualitative)\\n\\n      to
        evaluate correctness and applicability of an explanation. Can there be a universal\\n\\n
        \    framework, or should explanations be chosen and evaluated based on the
        audience and\\n\\n     domain? For example, work by Rasmussen et al. 58 attempts
        to focus on comparing\\n\\n      feature attribution XAI methods via Crippen\u2019s
        logP scores.\\n\\n\\n\\n\\n\\n                                       23Acknowledgements\\n\\n\\nResearch
        reported in this work was supported by the National Institute of General Medical\\n\\nSciences
        of the National Institutes of Health under award number R35GM137966. This work\\n\\nwas
